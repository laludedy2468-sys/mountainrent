{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card">
<div class="card-body">

<h3 class="text-center mb-4">
Register
</h3>

<form method="POST">

<input class="form-control mb-3"
name="full_name"
placeholder="Nama Lengkap">

<input class="form-control mb-3"
name="email"
placeholder="Email">

<input class="form-control mb-3"
type="password"
name="password"
placeholder="Password">

<button class="btn btn-success w-100">
Daftar
</button>

</form>

</div>
</div>

</div>
</div>

</div>
{% endblock %}
