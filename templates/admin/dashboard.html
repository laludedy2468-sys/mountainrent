{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

<h2>Admin Dashboard</h2>

<div class="row">

<div class="col-md-3">
<div class="card bg-primary text-white">
<div class="card-body">
<h3>{{ total_users }}</h3>
<p>Total User</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white">
<div class="card-body">
<h3>{{ total_products }}</h3>
<p>Total Produk</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning text-white">
<div class="card-body">
<h3>{{ total_rentals }}</h3>
<p>Total Rental</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger text-white">
<div class="card-body">
<h3>Rp {{ total_income }}</h3>
<p>Total Pendapatan</p>
</div>
</div>
</div>

</div>

<hr>

<a href="/admin/products" class="btn btn-success">
Kelola Produk
</a>

<a href="/admin/users" class="btn btn-primary">
Kelola User

Kelola Rental
